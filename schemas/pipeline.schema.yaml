# pipeline.yaml Schema
# 管线元信息。管线 = 成功 sprint 的抽象物 = 可复用超级 skill。
# 位置:~/.hermes/pipelines/<pipeline_id>/pipeline.yaml

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "pipeline.schema.yaml"

type: object
required: [id, version, name, stats]

properties:
  id:
    type: string
    description: 管线唯一标识,kebab-case,如 tutorial-content

  version:
    type: string
    description: semver,如 1.3.0

  name:
    type: string
    description: 人类可读名称

  description:
    type: string

  trigger_keywords:
    type: array
    items: {type: string}
    description: 用户任务描述里包含这些关键词时,Hermes 可以推荐此管线(v0.5 决策:不自动匹配,仅推荐)

  inputs:
    type: array
    description: 实例化管线时需要的用户输入
    items:
      type: object
      required: [name]
      properties:
        name: {type: string}
        type: {type: string, enum: [string, list, number, boolean]}
        required: {type: boolean, default: true}
        example: {}

  required_capabilities:
    type: array
    description: 执行本管线需要的能力清单。Hermes 在 phase=0 必须检查自己是否具备
    items: {type: string}

  feature_templates:
    type: array
    description: feature DAG 模板。phase=1 基于此实例化
    items:
      type: object
      required: [id, reusable]
      properties:
        id: {type: string}
        reusable: {type: boolean, description: "未来是否可抽出成独立管线"}
        candidate_pipeline: {type: string, description: "reusable=true 时的候选管线"}

  tooling_resolver:
    type: string
    description: tooling.md 模板文件名,相对管线根目录

  feature_template:
    type: string
    description: feature DAG 模板 JSON 文件名

  checkpoint_policy:
    type: string
    description: checkpoint 分布策略文件名

  yolo:
    type: object
    properties:
      eligibility:
        type: object
        properties:
          min_total_runs: {type: integer, default: 3}
          min_success_rate: {type: number, default: 0.9}
      abort_policy:
        type: string
        enum: [revoke_all]
        default: revoke_all
        description: "v0.5 决策:激进回退"
      abort_triggers:
        type: array
        items: {type: string}
        default:
          - "retry_count_in_sprint >= 2"
          - "any_feature_fail"
          - "external_irreversible"

  stats:
    type: object
    required: [total_runs, total_success_rate]
    properties:
      total_runs:
        type: integer
        description: 跨所有继承链累加(v0.5 决策:stats 继承)
      total_success_rate: {type: number, minimum: 0, maximum: 1}
      current_version_runs:
        type: integer
        description: 仅当前版本的运行次数,用于健康监控(安全阀)
      current_version_success_rate: {type: number}
      avg_duration_hours: {type: number}
      yolo_eligible: {type: boolean}
      last_run_at: {type: string, format: date-time}

  version_history:
    type: array
    description: 版本迭代历史。major 版本重置 stats,minor/patch 继承
    items:
      type: object
      required: [version, created]
      properties:
        version: {type: string}
        created: {type: string, format: date-time}
        changes:
          type: array
          items: {type: string}
        inherited_from:
          type: string
          description: 从哪个版本继承 stats;major 变更时为 null
        change_type:
          type: string
          enum: [patch, minor, major]
